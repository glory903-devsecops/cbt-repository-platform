# Render 배포 설정
services:
  - type: web
    name: cbt-repository-platform-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false   # Render 대시보드에서 직접 입력
    healthCheckPath: /
